<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>日本好物 DEMO</title>
<style>
:root {
  --bg:#fff5f5;
  --paper:#ffffff;
  --ink:#321e27;
  --muted:#806873;
  --line:#f0d6dc;
  --accent:#c72558;
  --accent-dark:#95183e;
  --gold:#d4974d;
  --font-main:"PingFang SC","Noto Sans CJK SC","Source Han Sans SC","Microsoft YaHei","Helvetica Neue",Arial,sans-serif;
  --font-number:"Helvetica Neue",Arial,sans-serif;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:var(--font-main);
  background:linear-gradient(180deg,#fff8f8 0,#fff2f4 420px,#fff8f6 100%);
  color:var(--ink);
}
button{font:inherit}
.nav{
  position:sticky;
  top:0;
  z-index:10;
  background:rgba(255,255,255,.94);
  border-bottom:1px solid var(--line);
  backdrop-filter:blur(10px);
}
.nav-inner{
  max-width:1240px;
  margin:auto;
  height:72px;
  padding:0 22px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.brand{
  font-family:var(--font-main);
  font-size:24px;
  font-weight:800;
  letter-spacing:.08em;
}
.brand small{
  display:block;
  color:var(--accent);
  font-family:var(--font-main);
  font-size:10px;
  letter-spacing:.2em;
  margin-top:4px;
}
.nav-links{
  display:flex;
  align-items:center;
  gap:28px;
  font-size:13px;
}
.nav-links a{
  color:#4d524d;
  text-decoration:none;
}
.cart-btn{
  border:0;
  border-radius:999px;
  background:var(--accent);
  color:#fff;
  padding:10px 16px;
  cursor:pointer;
}
.cart-btn:hover{background:var(--accent-dark);color:#fff}

.hero{
  max-width:1240px;
  margin:24px auto 0;
  padding:42px 22px;
  border:1px solid #f3d0d9;
  border-radius:26px;
  background:radial-gradient(circle at 85% 20%,rgba(255,255,255,.8),transparent 30%),linear-gradient(120deg,#f9d9df,#f5b9c8 58%,#e89ab2);
  box-shadow:0 18px 50px rgba(154,42,76,.12);
}
.hero h1{
  font-family:var(--font-main);
  font-size:42px;
  font-weight:800;
  margin:0 0 12px;
  letter-spacing:-.025em;
  line-height:1.22;
}
.hero p{
  color:var(--muted);
  max-width:680px;
  line-height:1.8;
  margin:0;
}

.category-filter{
  max-width:1240px;
  margin:22px auto 0;
  padding:0 22px;
  display:grid;
  gap:10px;
}
.category-level{
  display:flex;
  align-items:flex-start;
  gap:12px;
}
.category-label{
  flex:0 0 64px;
  padding-top:8px;
  color:var(--muted);
  font-size:12px;
  font-weight:700;
}
.categories,.subcategories{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
.category-btn{
  border:1px solid var(--line);
  background:rgba(255,255,255,.9);
  border-radius:999px;
  padding:8px 14px;
  cursor:pointer;
  color:#666b66;
}
.category-btn.active{
  background:var(--accent);
  color:#fff;
  border-color:var(--accent);
}

.main{
  max-width:1240px;
  margin:auto;
  padding:22px;
}
.section-head{
  display:flex;
  justify-content:space-between;
  align-items:end;
  margin-bottom:16px;
}
.section-head h2{
  font-family:var(--font-main);
  font-size:25px;
  font-weight:800;
  margin:0;
}
.section-head span{font-size:12px;color:#92958f}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:18px;
}
.card{
  background:var(--paper);
  border:1px solid var(--line);
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 8px 26px rgba(104,35,57,.07);
  transition:transform .2s,box-shadow .2s;
}
.card:hover{transform:translateY(-4px);box-shadow:0 16px 34px rgba(104,35,57,.14)}
.card img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  display:block;
  border-bottom:1px solid var(--line);
}
.card-body{padding:15px}
.product-brand{display:flex;align-items:center;gap:7px;margin-bottom:8px;color:var(--accent);font-size:10px;font-weight:800;letter-spacing:.09em;text-transform:uppercase}.product-brand::before{content:"";width:14px;height:2px;border-radius:2px;background:var(--accent)}
.card-name{min-height:46px;font-size:15px;line-height:1.5;font-weight:750;color:#342229;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.product-spec{display:inline-flex;align-items:center;min-height:24px;margin-top:8px;padding:4px 9px;border-radius:999px;background:#fff1f4;color:#8b5364;font-size:10px;font-weight:600}
.price-box{margin-top:12px;padding-top:11px;border-top:1px solid #f0dce1}
.price-line{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:7px}
.price-label{font-size:11px;color:#8c737c;white-space:nowrap}
.domestic-price{font-size:13px;color:#999;text-decoration:line-through;text-decoration-thickness:1px}
.overseas-line{margin-top:5px}
.overseas-line .price-label{color:var(--accent);font-weight:700}
.overseas-price{
  color:var(--accent);
  font-family:var(--font-number);
  font-size:23px;
  font-weight:700;
}
.overseas-price small{font-family:var(--font-main);font-size:10px;font-weight:500;margin-right:2px}
.add{
  margin-top:12px;
  width:100%;
  border:0;
  border-radius:10px;
  background:linear-gradient(135deg,var(--accent),#e14e79);
  color:#fff;
  padding:10px;
  cursor:pointer;
}
.add:hover{background:var(--accent-dark);color:#fff}

.drawer{
  position:fixed;
  right:-430px;
  top:0;
  width:410px;
  height:100vh;
  background:var(--paper);
  z-index:30;
  box-shadow:-14px 0 30px rgba(0,0,0,.12);
  transition:.25s;
  display:flex;
  flex-direction:column;
}
.drawer.open{right:0}
.drawer-head{
  padding:20px 22px;
  border-bottom:1px solid var(--line);
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.drawer-head h3{margin:0;font-family:var(--font-main);font-weight:800}
.close{
  border:0;
  background:transparent;
  font-size:26px;
  cursor:pointer;
}
.cart-list{
  flex:1;
  overflow:auto;
  padding:0 22px;
}
.cart-item{
  display:grid;
  grid-template-columns:64px 1fr auto;
  gap:12px;
  align-items:center;
  padding:14px 0;
  border-bottom:1px solid var(--line);
}
.cart-item img{width:64px;height:64px;object-fit:cover}
.cart-item-name{font-size:12px;line-height:1.4}
.cart-item-price{font-size:12px;color:var(--accent);margin-top:5px}
.qty{
  display:flex;
  align-items:center;
  gap:7px;
  margin-top:7px;
}
.qty button{
  width:24px;
  height:24px;
  border:1px solid var(--line);
  background:#fff;
  cursor:pointer;
}
.remove{
  border:0;
  background:transparent;
  color:#aaa;
  cursor:pointer;
  font-size:11px;
}
.cart-footer{
  border-top:1px solid var(--line);
  padding:18px 22px 22px;
}
.total-line{
  display:flex;
  justify-content:space-between;
  margin-bottom:14px;
}
.checkout{
  width:100%;
  border:0;
  background:linear-gradient(135deg,var(--accent),#e14e79);
  color:#fff;
  padding:13px;
  cursor:pointer;
  letter-spacing:.08em;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(24,27,24,.46);
  z-index:40;
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.modal.open{display:flex}
.checkout-panel{
  width:min(980px,96vw);
  max-height:92vh;
  overflow:auto;
  background:var(--paper);
  border:1px solid var(--line);
  padding:26px;
}
.checkout-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid var(--line);
  padding-bottom:14px;
}
.checkout-head h2{margin:0;font-family:var(--font-main);font-weight:800}
.summary{
  display:grid;
  grid-template-columns:1fr 300px;
  gap:24px;
  margin-top:20px;
}
.summary-table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}
.summary-table th,.summary-table td{
  border-bottom:1px solid var(--line);
  padding:12px 8px;
  text-align:left;
  vertical-align:top;
}
.summary-table th{color:#777;font-weight:600}
.order-box{
  border:1px solid var(--line);
  padding:18px;
  height:max-content;
  position:sticky;
  top:0;
}
.order-box h3{margin-top:0;font-family:var(--font-main);font-weight:800}
.order-row{
  display:flex;
  justify-content:space-between;
  margin:10px 0;
  font-size:13px;
}
.order-row.total{
  border-top:1px solid var(--line);
  padding-top:12px;
  font-size:17px;
  font-weight:700;
}
.confirm{
  margin-top:16px;
  width:100%;
  border:0;
  background:var(--accent);
  color:#fff;
  padding:12px;
}
.empty{
  padding:50px 20px;
  text-align:center;
  color:#999;
}

@media(max-width:900px){
  .grid{grid-template-columns:repeat(3,1fr)}
  .summary{grid-template-columns:1fr}
  .order-box{position:static}
}
@media(max-width:680px){
  .nav-inner{height:auto;padding:14px 16px;gap:12px}
  .nav-links a{display:none}
  .nav-links a.admin-link{display:block;font-size:12px;color:var(--accent);white-space:nowrap}
  .hero{padding:28px 16px}
  .hero h1{font-size:32px}
  .category-filter,.main{padding-left:16px;padding-right:16px}
  .category-level{display:block}
  .category-label{display:block;padding:0 0 7px}
  .grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .hero{margin:12px 12px 0;padding:26px 18px;border-radius:20px}
  .hero h1{font-size:29px}
  .card-body{padding:11px}
  .card-name{font-size:13px;min-height:42px}
  .product-brand{font-size:9px;margin-bottom:6px}
  .product-spec{font-size:9px;padding:3px 7px}
  .overseas-price{font-size:20px}
  .price-label{font-size:10px}
  .nav-links{gap:8px}
  .drawer{width:100%;right:-100%}
  .checkout-panel{padding:18px}
  .summary-table th:nth-child(3),.summary-table td:nth-child(3){display:none}
}

.qr-result{
  display:none;
  margin-top:18px;
  border-top:1px solid var(--line);
  padding-top:18px;
  text-align:center;
}
.qr-result.show{display:block}
.qr-result h3{
  margin:0 0 8px;
  font-family:var(--font-main);
  font-weight:800;
}
.qr-result p{
  margin:0 auto 14px;
  max-width:560px;
  color:#777c76;
  font-size:12px;
  line-height:1.7;
}
.qr-box{
  width:280px;
  min-height:280px;
  margin:0 auto;
  padding:14px;
  background:#fff;
  border:1px solid var(--line);
  display:flex;
  align-items:center;
  justify-content:center;
}
.qr-box img{
  width:250px;
  height:250px;
  display:block;
}
.qr-note{
  margin-top:12px!important;
  color:#999!important;
}
.copy-order{
  margin-top:12px;
  border:1px solid #313631;
  background:transparent;
  padding:10px 18px;
  cursor:pointer;
}
.copy-order:hover{background:#313631;color:#fff}

</style>
</head>
<body>
<header class="nav">
  <div class="nav-inner">
    <div class="brand">日选商店<small>JAPAN SELECT DEMO</small></div>
    <nav class="nav-links">
      <a href="#products">全部商品</a>
      <a href="#products">美妆药妆</a>
      <a href="#products">零食伴手礼</a>
      <a href="#products">服饰文创</a>
      <a href="admin.html" class="admin-link">商品管理</a>
      <button class="cart-btn" onclick="toggleCart()">购物车（<span id="cartCount">0</span>）</button>
    </nav>
  </div>
</header>

<section class="hero">
  <h1>日本日常好物精选</h1>
  <p>东京热门美妆与日本限定好物，一页轻松挑选。选中商品后可随时查看完整清单、数量与金额。</p>
</section>

<section class="category-filter" aria-label="商品分类筛选">
  <div class="category-level">
    <span class="category-label">商品分类</span>
    <div class="categories" id="categories"></div>
  </div>
  <div class="category-level" id="secondaryCategoryRow" hidden>
    <span class="category-label">细分品类</span>
    <div class="subcategories" id="subcategories"></div>
  </div>
</section>

<main class="main" id="products">
  <div class="section-head">
    <h2>商品一览</h2>
    <span id="countText"></span>
  </div>
  <section class="grid" id="grid"></section>
</main>

<aside class="drawer" id="drawer">
  <div class="drawer-head">
    <h3>购物车</h3>
    <button class="close" onclick="toggleCart()">×</button>
  </div>
  <div class="cart-list" id="cartList"></div>
  <div class="cart-footer">
    <div class="total-line"><span>商品数量</span><strong id="cartQty">0</strong></div>
    <div class="total-line"><span>合计</span><strong id="cartTotal">¥0</strong></div>
    <button class="checkout" onclick="openCheckout()">查看结算信息</button>
  </div>
</aside>

<div class="modal" id="checkoutModal">
  <div class="checkout-panel">
    <div class="checkout-head">
      <h2>订单确认</h2>
      <button class="close" onclick="closeCheckout()">×</button>
    </div>
    <div class="summary">
      <div id="summaryList"></div>
      <aside class="order-box">
        <h3>订单信息</h3>
        <div class="order-row"><span>商品种类</span><strong id="summaryKinds">0</strong></div>
        <div class="order-row"><span>商品总数</span><strong id="summaryQty">0</strong></div>
        <div class="order-row"><span>商品金额</span><strong id="summarySubtotal">¥0</strong></div>
        <div class="order-row"><span>国际运费</span><strong>待确认</strong></div>
        <div class="order-row total"><span>当前合计</span><strong id="summaryTotal">¥0</strong></div>
        <button class="confirm" onclick="generateOrderQR()">确认提交并生成二维码</button>
        <div class="qr-result" id="qrResult">
          <h3>订单分享二维码</h3>
          <p>其他用户扫码后可直接查看完整订单清单，无需截取长页面。</p>
          <div class="qr-box" id="qrBox"></div>
          <button class="copy-order" onclick="copyOrderText()">复制订单文字</button>
          <p class="qr-note" id="qrNote"></p>
        </div>
      </aside>
    </div>
  </div>
</div>

  "护肤/洁面卸妆","护肤/化妆水","护肤/精华液","护肤/乳液面霜","护肤/面膜","护肤/防晒","护肤/眼唇护理","护肤/护肤套装",

function splitCategory(category) {
  const parts = String(category || "未分类").split("/").map(v => v.trim()).filter(Boolean);
  return {primary: parts[0] || "未分类", secondary: parts.slice(1).join("/") || "其他"};
}

function getAvailableCategories() {
  let saved = [];
  try {
    const parsed = JSON.parse(localStorage.getItem("japanSelectCategories") || "[]");
    if (Array.isArray(parsed)) saved = parsed;
  } catch (error) { console.warn("分类数据读取失败", error); }
  return [...new Set([...DEFAULT_CATEGORIES, ...publishedCategories, ...saved, ...products.map(p => p.category).filter(Boolean)])];
}

function renderCategoryFilters() {
  const availableCategories = [...new Set(products.map(p => p.category).filter(Boolean))];
  const primaryCategories = ["全部", ...new Set(availableCategories.map(c => splitCategory(c).primary))];
  if (!primaryCategories.includes(activePrimaryCategory)) activePrimaryCategory = "全部";
  document.getElementById("categories").innerHTML = primaryCategories.map(c =>
    `<button class="category-btn ${c===activePrimaryCategory?"active":""}" onclick="setPrimaryCategory(decodeURIComponent('${encodeURIComponent(c)}'))">${c}</button>`
  ).join("");

  const row = document.getElementById("secondaryCategoryRow");
  const box = document.getElementById("subcategories");
  if (activePrimaryCategory === "全部") {
    activeSecondaryCategory = "全部";
    row.hidden = true;
    box.innerHTML = "";
    return;
  }
  const secondaryCategories = [...new Set(availableCategories
    .map(c => splitCategory(c))
    .filter(c => c.primary === activePrimaryCategory)
    .map(c => c.secondary))];
  if (!secondaryCategories.includes(activeSecondaryCategory)) activeSecondaryCategory = secondaryCategories[0] || "";
  row.hidden = false;
  box.innerHTML = secondaryCategories.map(c =>
    `<button class="category-btn ${c===activeSecondaryCategory?"active":""}" onclick="setSecondaryCategory(decodeURIComponent('${encodeURIComponent(c)}'))">${c}</button>`
  ).join("");
}

function refreshProductsFromStorage() {
  try {
    const savedProducts = localStorage.getItem("japanSelectProducts");
    if (!savedProducts) return false;
    const parsed = JSON.parse(savedProducts);
    if (!Array.isArray(parsed) || !parsed.length) return false;
    products.splice(0, products.length, ...parsed);
    renderCategoryFilters();
    renderProducts();
    return true;
  } catch (error) {
    console.warn("最新商品数据读取失败", error);
    return false;
  }
}

async function loadPublishedProducts() {
  try {
    const response = await fetch(`products.json?v=${Date.now()}`, {cache:"no-store"});
    if (!response.ok) return;
    const published = await response.json();
    if (!Array.isArray(published) || !published.length) return;
    const hasLocalEdits = Boolean(localStorage.getItem("japanSelectProductsUpdatedAt"));
    if (!hasLocalEdits) {
      products.splice(0, products.length, ...published);
      localStorage.setItem("japanSelectProducts", JSON.stringify(products));
    }
  } catch (error) {
    console.info("暂未找到线上商品数据，继续使用页面内置商品。", error);
  }
}

async function loadPublishedCategories() {
  try {
    const response = await fetch(`categories.json?v=${Date.now()}`, {cache:"no-store"});
    if (!response.ok) return;
    const data = await response.json();
    if (Array.isArray(data)) publishedCategories = data.filter(Boolean);
  } catch (error) {
    console.info("暂未找到线上分类数据，继续使用默认分类。", error);
  }
}

async function init() {
  await Promise.all([loadPublishedProducts(), loadPublishedCategories()]);
  try {
    const savedProducts = localStorage.getItem("japanSelectProducts");
    if (savedProducts) {
      const parsed = JSON.parse(savedProducts);
      if (Array.isArray(parsed) && parsed.length) products.splice(0, products.length, ...parsed);
    } else {
      localStorage.setItem("japanSelectProducts", JSON.stringify(products));
    }
    const savedCart = localStorage.getItem("japanSelectCart");
    if (savedCart) cart = JSON.parse(savedCart);
  } catch (error) { console.warn("本地商品数据读取失败", error); }
  renderCategoryFilters();
  renderProducts();
  renderCart();
}

function setPrimaryCategory(category) {
  activePrimaryCategory = category;
  activeSecondaryCategory = category === "全部" ? "全部" : "";
  renderCategoryFilters();
  renderProducts();
}

function setSecondaryCategory(category) {
  activeSecondaryCategory = category;
  renderCategoryFilters();
  renderProducts();
}

function getProductDisplay(p) {
  const fullName = String(p.name || "未命名商品").trim();
  const capacityMatch = fullName.match(/(?:\d+(?:\.\d+)?\s*(?:ml|mL|ML|g|G|kg|KG|枚|粒|片|支|个|盒|包|瓶|cm|CM))(?:\s*[×xX]\s*\d+)?/);
  const capacity = String(p.capacity || capacityMatch?.[0] || "规格待补充").trim();
  let brand = String(p.brand || "").trim();
  if (!brand) brand = fullName.split(/[\s·・]/)[0] || "日本精选";
  let title = String(p.productName || "").trim() || fullName;
  if (p.productName) return {brand,title,capacity};
  const brandPattern = brand.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
  title = title.replace(new RegExp(`^${brandPattern}[\\s·・-]*`,"i"),"").trim();
  if (capacityMatch) title = title.replace(capacityMatch[0],"").replace(/[\s·・-]+$/g,"").trim();
  return {brand,title:title || fullName,capacity};
}

function renderProducts() {
  const list = products.filter(p => {
    const category = splitCategory(p.category);
    return (activePrimaryCategory === "全部" || category.primary === activePrimaryCategory) &&
      (activeSecondaryCategory === "全部" || category.secondary === activeSecondaryCategory);
  });
  document.getElementById("countText").textContent = `共 ${list.length} 件商品，全部在本页展示`;
  document.getElementById("grid").innerHTML = list.map(p => { const display=getProductDisplay(p); return `
    <article class="card">
      <img src="${p.image}" alt="${p.name}">
      <div class="card-body">
        <div class="product-brand">${display.brand}</div>
        <div class="card-name">${display.title}</div>
        <div class="product-spec">${display.capacity}</div>
        <div class="price-box">
          <div class="price-line">
            <span class="price-label">国内参考价</span>
            <span class="domestic-price">¥${Number(p.domesticPrice || Math.ceil(p.price * 1.35 / 10) * 10).toLocaleString()}</span>
          </div>
          <div class="price-line overseas-line">
            <span class="price-label">海外购价格</span>
            <span class="overseas-price"><small>¥</small>${Number(p.price).toLocaleString()}</span>
          </div>
        </div>
        <button class="add" onclick="addToCart(${p.id})">加入购物车</button>
      </div>
    </article>
  `}).join("");
}

function addToCart(id) {
  const product = products.find(p => p.id === id);
  const existing = cart.find(item => item.id === id);
  if (existing) existing.qty += 1;
  else cart.push({...product, qty:1});
  renderCart();
  localStorage.setItem("japanSelectCart", JSON.stringify(cart));
}

function changeQty(id, delta) {
  const item = cart.find(x => x.id === id);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) cart = cart.filter(x => x.id !== id);
  renderCart();
  localStorage.setItem("japanSelectCart", JSON.stringify(cart));
}

function removeItem(id) {
  cart = cart.filter(x => x.id !== id);
  renderCart();
  localStorage.setItem("japanSelectCart", JSON.stringify(cart));
}

function renderCart() {
  const qty = cart.reduce((sum, x) => sum + x.qty, 0);
  const total = cart.reduce((sum, x) => sum + x.price * x.qty, 0);
  document.getElementById("cartCount").textContent = qty;
  document.getElementById("cartQty").textContent = qty;
  document.getElementById("cartTotal").textContent = "¥" + total.toLocaleString();

  document.getElementById("cartList").innerHTML = cart.length ? cart.map(x => `
    <div class="cart-item">
      <img src="${x.image}" alt="${x.name}">
      <div>
        <div class="cart-item-name">${x.name}</div>
        <div class="cart-item-price">¥${x.price.toLocaleString()}</div>
        <div class="qty">
          <button onclick="changeQty(${x.id},-1)">−</button>
          <span>${x.qty}</span>
          <button onclick="changeQty(${x.id},1)">＋</button>
        </div>
      </div>
      <button class="remove" onclick="removeItem(${x.id})">删除</button>
    </div>
  `).join("") : `<div class="empty">购物车为空</div>`;
}

function toggleCart() {
  document.getElementById("drawer").classList.toggle("open");
}

function openCheckout() {
  const modal = document.getElementById("checkoutModal");
  const subtotal = cart.reduce((sum, x) => sum + x.price * x.qty, 0);
  const qty = cart.reduce((sum, x) => sum + x.qty, 0);

  document.getElementById("summaryKinds").textContent = cart.length;
  document.getElementById("summaryQty").textContent = qty;
  document.getElementById("summarySubtotal").textContent = "¥" + subtotal.toLocaleString();
  document.getElementById("summaryTotal").textContent = "¥" + subtotal.toLocaleString();

  document.getElementById("summaryList").innerHTML = cart.length ? `
    <table class="summary-table">
      <thead>
        <tr><th>商品</th><th>数量</th><th>单价</th><th>小计</th></tr>
      </thead>
      <tbody>
        ${cart.map(x => `
          <tr>
            <td>${x.name}</td>
            <td>${x.qty}</td>
            <td>¥${x.price.toLocaleString()}</td>
            <td>¥${(x.price*x.qty).toLocaleString()}</td>
          </tr>
        `).join("")}
      </tbody>
    </table>
  ` : `<div class="empty">暂无商品，请先加入购物车。</div>`;

  document.getElementById("qrResult").classList.remove("show");
  document.getElementById("qrBox").innerHTML = "";
  modal.classList.add("open");
}

function closeCheckout() {
  document.getElementById("checkoutModal").classList.remove("open");
}


function buildOrderText() {
  const qty = cart.reduce((sum, x) => sum + x.qty, 0);
  const total = cart.reduce((sum, x) => sum + x.price * x.qty, 0);

  const lines = [
    "日本代购订单清单",
    "商品种类：" + cart.length,
    "商品总数：" + qty,
    "----------------"
  ];

  cart.forEach((x, index) => {
    lines.push(
      (index + 1) + ". " + x.name +
      " ×" + x.qty +
      "｜¥" + x.price.toLocaleString() +
      "｜小计 ¥" + (x.price * x.qty).toLocaleString()
    );
  });

  lines.push("----------------");
  lines.push("商品金额：¥" + total.toLocaleString());
  lines.push("国际运费：待确认");
  lines.push("当前合计：¥" + total.toLocaleString());

  return lines.join("\n");
}

function generateOrderQR() {
  if (!cart.length) {
    alert("请先加入商品。");
    return;
  }

  currentOrderText = buildOrderText();
  const encoded = encodeURIComponent(currentOrderText);

  // DEMO 使用公开二维码生成服务。扫码内容是完整订单文字。
  const qrUrl =
    "https://api.qrserver.com/v1/create-qr-code/" +
    "?size=500x500&margin=12&ecc=M&data=" + encoded;

  document.getElementById("qrBox").innerHTML =
    `<img src="${qrUrl}" alt="订单分享二维码">`;

  const byteLength = new TextEncoder().encode(currentOrderText).length;
  document.getElementById("qrNote").textContent =
    "二维码包含 " + cart.length + " 种商品、" +
    cart.reduce((sum, x) => sum + x.qty, 0) +
    " 件商品。订单数据约 " + byteLength + " 字节。";

  document.getElementById("qrResult").classList.add("show");
  document.getElementById("qrResult").scrollIntoView({
    behavior: "smooth",
    block: "center"
  });
}

async function copyOrderText() {
  if (!currentOrderText) currentOrderText = buildOrderText();
  try {
    await navigator.clipboard.writeText(currentOrderText);
    alert("订单文字已复制。");
  } catch (error) {
    const area = document.createElement("textarea");
    area.value = currentOrderText;
    document.body.appendChild(area);
    area.select();
    document.execCommand("copy");
    area.remove();
    alert("订单文字已复制。");
  }
}

init();
window.addEventListener("storage", event => {
  if (event.key === "japanSelectProducts" || event.key === "japanSelectProductsUpdatedAt") refreshProductsFromStorage();
});
window.addEventListener("pageshow", refreshProductsFromStorage);
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible") refreshProductsFromStorage();
});
if ("BroadcastChannel" in window) {
  const productChannel = new BroadcastChannel("japanSelectProductUpdates");
  productChannel.onmessage = refreshProductsFromStorage;
}
</script>
